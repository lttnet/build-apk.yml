name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Flet and dependencies
      run: |
        pip install flet==0.21.2
        pip install pillow opencv-python pyzbar numpy
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
    
    - name: Build APK
      run: flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: StoreManagement-App
        path: build/apk/*.apk
