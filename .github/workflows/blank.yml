name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLET_VERSION: '0.21.2' # Your specific version

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          # Add other dependencies if you have a requirements.txt
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      # This step is automatically handled by 'flet build apk'
      # But we set the environment variable just in case
      - name: Build APK
        run: flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: store-management-apk
          path: build/apk/*.apk
